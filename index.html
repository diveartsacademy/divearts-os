  function saveConvos(a){try{localStorage.setItem('os_ceo_convos',JSON.stringify(a.slice(-40)));}catch(e){}}
  function ensureConvo(){var a=getConvos();if(!curConvo||!a.some(function(c){return c.id===curConvo;})){if(a.length){curConvo=a[0].id;}else{var n={id:uid(),title:'New conversation',msgs:[]};a.unshift(n);saveConvos(a);curConvo=n.id;}}return getConvos().filter(function(c){return c.id===curConvo;})[0];}
  function newConvo(){var a=getConvos();var n={id:uid(),title:'New conversation',msgs:[]};a.unshift(n);saveConvos(a);curConvo=n.id;render();}
  function delConvo(id){var a=getConvos().filter(function(c){return c.id!==id;});saveConvos(a);if(curConvo===id)curConvo=null;render();}

  var st=document.createElement('style');
  st.textContent='#os-cp-ov{position:fixed;inset:0;z-index:2147483647;background:#F6F1E7;display:none;flex-direction:column;font-family:Lato,-apple-system,sans-serif}#os-cp-ov .hd{display:flex;align-items:center;gap:14px;padding:12px 20px;background:#0C2A3A;color:#fff;flex:none}#os-cp-ov .hd .av{width:32px;height:32px;border-radius:9px;background:#C79A3B;color:#0C2A3A;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}#os-cp-ov .hd .t{font-family:Georgia,serif;font-size:18px;font-weight:700}#os-cp-ov .tabs{display:flex;gap:8px;margin-left:10px}#os-cp-ov .tb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#DCE6EC;border-radius:16px;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer}#os-cp-ov .tb.on{background:#C79A3B;color:#0C2A3A;border-color:#C79A3B}#os-cp-ov .hd .x{margin-left:auto;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1}#os-cp-ov .body{flex:1;display:flex;min-height:0}#os-cp-ov .rail{width:250px;flex:none;border-right:1px solid #E2D9C4;background:#EFE7D6;overflow:auto;padding:12px}#os-cp-ov .nw{width:100%;background:#0C2A3A;color:#fff;border:none;border-radius:10px;padding:10px;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:10px}#os-cp-ov .ci{padding:9px 11px;border-radius:9px;font-size:13px;color:#2A3B44;cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:3px}#os-cp-ov .ci:hover{background:#E4DAC2}#os-cp-ov .ci.on{background:#0C2A3A;color:#fff}#os-cp-ov .ci .tt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}#os-cp-ov .ci .dl{opacity:.5;font-size:15px}#os-cp-ov .main{flex:1;display:flex;flex-direction:column;min-width:0}#os-cp-ov .wrap{flex:1;overflow:auto;padding:22px}#os-cp-ov .in{max-width:820px;margin:0 auto}#os-cp-ov .row{display:flex;margin:10px 0}#os-cp-ov .row.me{justify-content:flex-end}#os-cp-ov .bub{max-width:80%;padding:11px 15px;border-radius:14px;font-size:14.5px;line-height:1.55;box-shadow:0 1px 3px rgba(0,0,0,.06);white-space:normal}#os-cp-ov .row.me .bub{background:#0C2A3A;color:#fff;border-bottom-right-radius:4px}#os-cp-ov .row.ai .bub{background:#fff;color:#122;border:1px solid #E6DFCF;border-bottom-left-radius:4px}#os-cp-ov .bub.typing{color:#6E7B82;font-style:italic}#os-cp-ov .foot{border-top:1px solid #E6DFCF;background:#fff;padding:12px 22px;flex:none}#os-cp-ov .fin{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}#os-cp-ov textarea{flex:1;resize:none;height:56px;border:1px solid #C9BE9E;border-radius:12px;padding:11px 14px;font-size:14.5px;font-family:inherit;background:#fff;color:#0C2A3A}#os-cp-ov .send{background:#C79A3B;color:#0C2A3A;border:none;border-radius:12px;padding:12px 20px;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap}#os-cp-ov .ecard{background:#fff;border:1px solid #E6DFCF;border-left:4px solid #C79A3B;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;max-width:820px}#os-cp-ov .ecard:hover{box-shadow:0 3px 12px rgba(0,0,0,.08)}#os-cp-ov .ecard .et{font-family:Georgia,serif;font-size:15.5px;font-weight:700;color:#0C2A3A}#os-cp-ov .ecard .em{font-size:11.5px;color:#8A6E2E;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:3px 0}#os-cp-ov .ecard .ep{font-size:13.5px;color:#4A5A62;margin-top:5px;line-height:1.5}#os-cp-ov .analysis{background:#fff;border:1px solid #E6DFCF;border-radius:12px;padding:18px 20px;font-size:14px;line-height:1.6;color:#16242B;white-space:pre-wrap;max-width:820px}#os-cp-ov .barbtn{background:#0C2A3A;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:800;font-size:13px;cursor:pointer;margin-right:8px}#os-cp-ov .ghost{background:#EDE4D0;color:#0C2A3A;border:1px solid #D8CBAB}#os-cp-ov .empty{color:#7A8891;font-size:13.5px;text-align:center;margin-top:40px}';

  var ov=document.createElement('div');ov.id='os-cp-ov';
  ov.innerHTML='<div class="hd"><div class="av">&#9733;</div><div class="t">CEO Partner</div><div class="tabs"><button class="tb on" id="os-cp-tchat">Chat</button><button class="tb" id="os-cp-traised">Raised to you</button></div><button class="x" id="os-cp-x">&times;</button></div><div class="body"><div class="rail" id="os-cp-rail"></div><div class="main" id="os-cp-main"></div></div>';

  function renderRail(){var r=document.getElementById('os-cp-rail');if(!r)return;
    if(MODE!=='chat'){r.style.display='none';return;}
    r.style.display='block';
    var a=getConvos();var h='<button class="nw" id="os-cp-new">+ New conversation</button>';
    if(!a.length)h+='<div class="empty" style="margin-top:14px">No conversations yet.</div>';
    a.forEach(function(c){h+='<div class="ci'+(c.id===curConvo?' on':'')+'" data-cid="'+c.id+'"><span class="tt">'+esc(c.title||'Untitled')+'</span><span class="dl" data-del="'+c.id+'">&times;</span></div>';});
    r.innerHTML=h;
  }
  function renderChat(){var m=document.getElementById('os-cp-main');if(!m)return;
    var c=ensureConvo();
    var h='<div class="wrap"><div class="in" id="os-cp-msgs"></div></div><div class="foot"><div class="fin"><textarea id="os-cp-in" placeholder="Bring me the problem, however messy…"></textarea><button class="send" id="os-cp-send">Send</button></div></div>';
    m.innerHTML=h;paintMsgs();
    setTimeout(function(){var i=document.getElementById('os-cp-in');if(i)i.focus();},50);
  }
  function paintMsgs(){var box=document.getElementById('os-cp-msgs');if(!box)return;var c=ensureConvo();
    var h='<div class="row ai"><div class="bub">'+esc(GREET).replace(/\n/g,'<br>')+'</div></div>';
    (c.msgs||[]).forEach(function(e){h+='<div class="row '+(e.role==='user'?'me':'ai')+'"><div class="bub">'+esc(e.content).replace(/\n/g,'<br>')+'</div></div>';});
    box.innerHTML=h;var w=box.parentNode;if(w)w.scrollTop=w.scrollHeight;}
  function sendChat(){var inp=document.getElementById('os-cp-in');if(!inp)return;var t=(inp.value||'').trim();if(!t)return;
    var all=getConvos();var c=all.filter(function(x){return x.id===curConvo;})[0];if(!c)return;
    c.msgs=c.msgs||[];c.msgs.push({role:'user',content:t});
    if(c.title==='New conversation'||!c.title){c.title=t.slice(0,42)+(t.length>42?'…':'');}
    saveConvos(all);inp.value='';paintMsgs();renderRail();
    var box=document.getElementById('os-cp-msgs');var tp=document.createElement('div');tp.className='row ai';tp.innerHTML='<div class="bub typing">Thinking through it…</div>';box.appendChild(tp);var w=box.parentNode;if(w)w.scrollTop=w.scrollHeight;
    var lines=['CEO Partner: '+GREET];c.msgs.slice(-16).forEach(function(e){lines.push((e.role==='user'?'Befa':'CEO Partner')+': '+e.content);});
    var body=new URLSearchParams({sys:SYS,msg:lines.join('\n\n')});
    fetch(API,{method:'POST',body:body}).then(function(r){return r.text();}).then(function(txt){var a2=getConvos();var c2=a2.filter(function(x){return x.id===curConvo;})[0];if(!c2)return;c2.msgs.push({role:'assistant',content:(txt||'').trim()||'(No reply. Try Send again.)'});saveConvos(a2);paintMsgs();}).catch(function(){var a2=getConvos();var c2=a2.filter(function(x){return x.id===curConvo;})[0];if(c2){c2.msgs.push({role:'assistant',content:'(Could not reach me just now — tap Send again.)'});saveConvos(a2);paintMsgs();}});
  }
  function renderRaised(){var m=document.getElementById('os-cp-main');if(!m)return;
    if(curEsc){renderEscDetail();return;}
    var h='<div class="wrap"><div class="in">';
    if(!escLoaded){h+='<div class="empty">Loading…</div>';}
    else if(!escs.length){h+='<div class="empty">Nothing raised to you right now. When a chief or agent raises a strategic problem to CEO level, it will appear here with a full recommendation.</div>';}
    else{escs.forEach(function(e){h+='<div class="ecard" data-eid="'+e.id+'"><div class="et">'+esc(e.title)+'</div><div class="em">'+esc(e.unit||'')+(e.source?' &middot; from '+esc(e.source):'')+'</div><div class="ep">'+esc((e.problem||'').slice(0,220))+((e.problem||'').length>220?'…':'')+'</div></div>';});}
    h+='</div></div>';m.innerHTML=h;
  }
  function renderEscDetail(){var m=document.getElementById('os-cp-main');if(!m)return;
    var e=escs.filter(function(x){return String(x.id)===String(curEsc);})[0];if(!e){curEsc=null;renderRaised();return;}
    var h='<div class="wrap"><div class="in">';
    h+='<div style="margin-bottom:12px"><span class="barbtn ghost" id="os-cp-eback">&#8249; Back</span></div>';
    h+='<div class="ecard" style="cursor:default"><div class="et">'+esc(e.title)+'</div><div class="em">'+esc(e.unit||'')+(e.source?' &middot; from '+esc(e.source):'')+'</div><div class="ep">'+esc(e.problem||'')+'</div>'+(e.context?'<div class="ep" style="color:#8A6E2E"><b>Context:</b> '+esc(e.context)+'</div>':'')+'</div>';
    h+='<div style="margin:14px 0"><button class="barbtn" id="os-cp-analyze">'+(e.analysis?'Re-analyze':'Get CEO analysis')+'</button><button class="barbtn ghost" id="os-cp-resolve">Mark resolved</button></div>';
    h+='<div id="os-cp-anwrap">'+(e.analysis?'<div class="analysis">'+esc(e.analysis)+'</div>':'')+'</div>';
    h+='</div></div>';m.innerHTML=h;
  }
  function loadEscs(cb){escLoaded=false;fetch(ESC+'?action=feed&t='+Date.now(),{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){escs=Array.isArray(d)?d:[];escLoaded=true;if(cb)cb();else render();}).catch(function(){escs=[];escLoaded=true;if(cb)cb();else render();});}
  function analyzeEsc(){var e=escs.filter(function(x){return String(x.id)===String(curEsc);})[0];if(!e)return;
    var w=document.getElementById('os-cp-anwrap');if(w)w.innerHTML='<div class="analysis" style="color:#6E7B82;font-style:italic">Analyzing… (Opus is thinking through options, risks, and the decision)</div>';
    var msg=ANINSTR+'Source: '+(e.source||'')+'\nUnit: '+(e.unit||'')+'\nTitle: '+e.title+'\nProblem: '+(e.problem||'')+'\nContext: '+(e.context||'');
    var body=new URLSearchParams({sys:SYS,msg:msg});
    fetch(API,{method:'POST',body:body}).then(function(r){return r.text();}).then(function(txt){var an=(txt||'').trim()||'(No analysis came back — try again.)';e.analysis=an;var w2=document.getElementById('os-cp-anwrap');if(w2)w2.innerHTML='<div class="analysis">'+esc(an)+'</div>';
      fetch(ESC,{method:'POST',body:new URLSearchParams({action:'analysis',id:String(e.id),analysis:an})}).catch(function(){});
    }).catch(function(){var w2=document.getElementById('os-cp-anwrap');if(w2)w2.innerHTML='<div class="analysis" style="color:#8A2E2E">Could not reach the analysis service — try again.</div>';});
  }
  function resolveEsc(){var e=escs.filter(function(x){return String(x.id)===String(curEsc);})[0];if(!e)return;
    fetch(ESC,{method:'POST',body:new URLSearchParams({action:'resolve',id:String(e.id),resolution:'Resolved from CEO Partner'})}).catch(function(){});
    escs=escs.filter(function(x){return String(x.id)!==String(curEsc);});curEsc=null;render();updateBadge();
  }
  function render(){renderRail();if(MODE==='chat'){renderChat();}else{renderRaised();}}
  function setMode(mm){MODE=mm;curEsc=null;

    if(tc)tc.className='tb'+(mm==='chat'?' on':'');if(tr)tr.className='tb'+(mm==='raised'?' on':'');

  }
  function updateBadge(){var b=document.getElementById('os-cp-traised');if(b){var n=escs.length;b.textContent='Raised to you'+(escLoaded&&n?' ('+n+')':'');}}

  function ensureOv(){if(!document.documentElement.contains(ov))document.documentElement.appendChild(ov);if(!document.head.contains(st))document.head.appendChild(st);}
  function open_(){ensureOv();var a=document.getElementById('os-acc');if(a)a.style.display='none';ov.style.display='flex';setMode(MODE);loadEscs(function(){updateBadge();});}
  window.__osCEOOpen=open_;
  ov.addEventListener('click',function(e){var t=e.target;if(!t)return;
    if(t.id==='os-cp-x'){ov.style.display='none';return;}
    if(t.id==='os-cp-tchat'){setMode('chat');return;}
    if(t.id==='os-cp-traised'){setMode('raised');return;}
    if(t.id==='os-cp-new'){newConvo();return;}
    if(t.id==='os-cp-send'){sendChat();return;}
    if(t.id==='os-cp-eback'){curEsc=null;renderRaised();return;}
    if(t.id==='os-cp-analyze'){analyzeEsc();return;}
    if(t.id==='os-cp-resolve'){resolveEsc();return;}
    var del=t.getAttribute&&t.getAttribute('data-del');if(del){e.stopPropagation();delConvo(del);return;}
    var ci=t.closest?t.closest('.ci'):null;if(ci&&ci.getAttribute('data-cid')){curConvo=ci.getAttribute('data-cid');render();return;}
    var ec=t.closest?t.closest('.ecard'):null;if(ec&&ec.getAttribute('data-eid')){curEsc=ec.getAttribute('data-eid');renderEscDetail();return;}
  });
  document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){var el=document.activeElement;if(el&&el.id==='os-cp-in'){e.preventDefault();sendChat();}}},true);
  document.addEventListener('click',function(e){var n=e.target&&e.target.closest?e.target.closest('#os-cp-nav'):null;if(n){e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();open_();}},true);

  function ensureNav(){ if(document.getElementById('os-cp-nav'))return;
    var links=[].slice.call(document.querySelectorAll('aside a'));if(!links.length)links=[].slice.call(document.querySelectorAll('nav a'));
    if(!links.length)return;
    var anchor=null;for(var i=0;i<links.length;i++){if(/business development/i.test(links[i].textContent)){anchor=links[i];break;}}
    if(!anchor){for(var j=0;j<links.length;j++){if(/pending changes/i.test(links[j].textContent)){anchor=links[j];break;}}}
    if(!anchor)anchor=links[links.length-1];
    var item=anchor.cloneNode(true);item.id='os-cp-nav';item.style.cursor='pointer';
    var alln=[item].concat([].slice.call(item.querySelectorAll('*')));alln.forEach(function(n){[].slice.call(n.attributes||[]).forEach(function(a){if(/^sc-/.test(a.name)||a.name==='href'||a.name==='title')n.removeAttribute(a.name);});});
    var spans=item.querySelectorAll('span');
    spans.forEach(function(sp){if(sp.children.length===0){var t=sp.textContent.trim();if(t.length===1){sp.textContent='★';}else if(/business development|pending changes/i.test(t)){sp.textContent='CEO Partner';}else if(/^\d+$/.test(t)){sp.remove();}}});
    item.onclick=function(e){e.preventDefault();e.stopPropagation();open_();};
    anchor.parentNode.insertBefore(item,anchor.nextSibling);
  }
  function tick(){try{ensureNav();ensureOv();}catch(e){}}tick();setInterval(tick,800);
})();
</script>
<script>
/* DiveArts OS - Agent Control Center: Chat button on chief/manager cards */
(function(){
  if(window.__osAccChat)return; window.__osAccChat=1;
  function chiefOf(t){t=(t||'').toLowerCase();
    if(t.indexOf('orchestrator')>=0)return 'coo';
    if(t.indexOf('manager')<0)return null;
    if(t.indexOf('business development')>=0)return 'bd';
    if(t.indexOf('customer')>=0||t.indexOf('experience')>=0||/\bcx\b/.test(t))return 'cx';
    if(t.indexOf('sales')>=0)return 'sales';
    if(t.indexOf('marketing')>=0)return 'mkt';
    if(t.indexOf('production')>=0||t.indexOf('performance')>=0)return 'prod';
    if(t.indexOf('finance')>=0||t.indexOf('financial')>=0)return 'fin';
    if(t.indexOf('operation')>=0)return 'coo';
    return null;
  }
  function scan(){
    if(!window.__osChiefChat)return;
    var els=document.querySelectorAll('h1,h2,h3,h4,strong,b,div,span');
    for(var i=0;i<els.length;i++){var el=els[i];
      if(el.getAttribute&&el.getAttribute('data-oscc'))continue;
      if(el.children.length>1)continue;
      var tx=(el.textContent||'').trim();
      if(tx.length<3||tx.length>60)continue;
      if(tx===tx.toUpperCase())continue;
      if(tx.toLowerCase()==='orchestrator'||tx.toLowerCase().indexOf('department managers')===0)continue;
      var id=chiefOf(tx);
      if(!id)continue;
      el.setAttribute('data-oscc','1');
      var bt=document.createElement('button');
      bt.textContent='💬 Chat';
      bt.setAttribute('data-oscc-btn','1');
      bt.setAttribute('data-chief',id);
      bt.style.cssText='margin-left:10px;border:none;background:#C79A3B;color:#0C2A3A;border-radius:14px;padding:3px 11px;font:700 11px Lato,sans-serif;cursor:pointer;vertical-align:middle';
      el.appendChild(bt);
    }
  }
  document.addEventListener('click',function(e){var n=e.target&&e.target.closest?e.target.closest('[data-oscc-btn]'):null;if(n){e.preventDefault();e.stopPropagation();if(e.stopImmediatePropagation)e.stopImmediatePropagation();if(window.__osChiefChat)window.__osChiefChat(n.getAttribute('data-chief'));}},true);
  scan();setInterval(scan,1000);
})();
</script>

    if(!document.getElementById('os-mobile-css')){var st=document.createElement('style');st.id='os-mobile-css';st.textContent=CSS;h.appendChild(st);}

<script>
/* DiveArts OS - UX cleanup: hide Pending Changes nav + Agents/Hanayah floating buttons; Hanayah on/off moved into Agent Control Center; injected overlays dock beside the menu + auto-switch on nav tap (no X needed) */
(function(){
  if(window.__osUX)return; window.__osUX=1;
  var CC='https://hook.eu1.make.com/9121dpkpp16paxpcfpr7olc5p1pxe3sh';
  var OVS=['os-acc','os-cp-ov','os-ci-ov','os-bd-ov'];
  var UXCSS=[
    '#os-acc-btn,#os-agent-chip{display:none !important}',
    '@media (min-width:641px){#os-acc,#os-cp-ov,#os-ci-ov,#os-bd-ov{left:250px !important}}',
    '.os-hana{margin-left:auto;display:inline-flex;align-items:center;gap:8px;background:#0C2A3A;border:1px solid #C79A3B;color:#fff;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:Lato,sans-serif;white-space:nowrap}',
    '.os-hana .dot{width:9px;height:9px;border-radius:50%;background:#3FA34D;flex:none}',
    '.os-hana.off .dot{background:#8A2E2E}',
    '#os-hana-fixed{position:fixed;top:14px;right:20px;z-index:2147483646;display:none}'
  ].join('');
  function closeOverlay(id){var e=document.getElementById(id);if(!e)return;if(id==='os-acc'){e.classList.remove('open');}else{e.style.display='none';}}
  function closeAllExcept(keep){OVS.forEach(function(id){if(id!==keep)closeOverlay(id);});}
  document.addEventListener('click',function(ev){
    var a=ev.target&&ev.target.closest?ev.target.closest('aside a'):null;if(!a)return;
    var id=a.id,keep=null,t=(a.textContent||'').toLowerCase();
    if(id==='os-cp-nav')keep='os-cp-ov';
    else if(id==='os-ci-nav')keep='os-ci-ov';
    else if(id==='os-bd-nav')keep='os-bd-ov';
    else if(t.indexOf('agent control center')>=0)keep='os-acc';
    setTimeout(function(){closeAllExcept(keep);},40);
  },true);
  function hanaLabel(b){var en=localStorage.getItem('os_enabled')!=='false';b.className='os-hana'+(en?'':' off');b.innerHTML='<span class="dot"></span>Hanayah (CX): '+(en?'ON':'OFF');}
  function ensure(){try{
    if(!document.getElementById('os-ux-css')){var cs=document.createElement('style');cs.id='os-ux-css';cs.textContent=UXCSS;(document.head||document.documentElement).appendChild(cs);}
    [].slice.call(document.querySelectorAll('aside a')).forEach(function(a){if(/pending changes/i.test(a.textContent)){a.style.display='none';}});
    var accActive=[].slice.call(document.querySelectorAll('button,div,span')).some(function(e){return /^Agents & framework$/i.test((e.textContent||'').trim()) && !(e.closest&&e.closest('aside')) && e.getClientRects().length;});
    var hf=document.getElementById('os-hana-fixed');
    if(!hf){
      hf=document.createElement('button');hf.id='os-hana-fixed';hf.type='button';
      hf.onclick=function(e){e.stopPropagation();var en=localStorage.getItem('os_enabled')!=='false';var next=!en;if(!confirm('Turn Hanayah '+(next?'ON':'OFF')+'? This takes effect immediately for all customers.'))return;fetch(CC+'?action=toggle&enabled='+next).then(function(r){return r.json();}).then(function(){localStorage.setItem('os_enabled',String(next));hanaLabel(hf);}).catch(function(){alert('Could not reach the automation layer. Try again.');});};
      document.body.appendChild(hf);
    }
    hanaLabel(hf);
    hf.style.display=accActive?'inline-flex':'none';
  }catch(e){}}
  ensure();setInterval(ensure,1000);
})();
</script>
